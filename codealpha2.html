<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    width:320px;
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    font-size:28px;
    text-align:right;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    background:#fff;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#f1f1f1;
}

.operator{
    background:#ff9800;
    color:white;
}

.equal{
    background:#4caf50;
    color:white;
}

.clear{
    background:#f44336;
    color:white;
}

@media(max-width:400px){
    .calculator{
        width:95%;
    }
}

</style>
</head>
<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="appendValue('*')">×</button>
<button class="operator" onclick="deleteLast()">⌫</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>

</div>

</div>

<script>

const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){

    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }

}

/* Keyboard Support */

document.addEventListener("keydown", function(event){

    const key = event.key;

    if(
        (key >= "0" && key <= "9") ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "."
    ){
        appendValue(key);
    }

    else if(key === "Enter"){
        calculate();
    }

    else if(key === "Backspace"){
        deleteLast();
    }

    else if(key === "Escape"){
        clearDisplay();
    }

});

</script>

</body>
</html>
